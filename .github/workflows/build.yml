name: Build

on:
  pull_request:
    branches:
      - main
      - preview
      - preview
  push:
    branches:
      - main
      - preview
      - preview

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI || 'mongodb://localhost:27017/test' }}
          DB_NAME: ${{ secrets.DB_NAME || 'messmass_test' }}

